<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="25%" stop-color="#FFFDD0" />
      <stop offset="50%" stop-color="#AA7C11" />
      <stop offset="75%" stop-color="#FDF6C7" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>
    <!-- Silver Gradient -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9D9D9" />
      <stop offset="25%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#9C9C9C" />
      <stop offset="75%" stop-color="#F0F0F0" />
      <stop offset="100%" stop-color="#5E5E5E" />
    </linearGradient>
    <!-- Black Leather Gradients -->
    <linearGradient id="leather-black" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2c" />
      <stop offset="50%" stop-color="#141414" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <radialGradient id="studio-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="70%" stop-color="#0E0E0E" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <radialGradient id="bag-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.85)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    <pattern id="saffiano-grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000" stroke-width="0.8" opacity="0.35" />
      <line x1="0" y1="4" x2="4" y2="0" stroke="#000" stroke-width="0.8" opacity="0.35" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#studio-bg)" />
  <ellipse cx="400" cy="510" rx="210" ry="22" fill="url(#bag-shadow)" />

  <!-- Black Tote Drawing -->
  <g id="tote-bag">
    <!-- Handles (Tall dual leather loops) -->
    <!-- Front Handle -->
    <path d="M 320,240 C 320,70 480,70 480,240" fill="none" stroke="#151515" stroke-width="12" stroke-linecap="round" />
    <path d="M 320,240 C 320,70 480,70 480,240" fill="none" stroke="url(#saffiano-grain)" stroke-width="12" stroke-linecap="round" />
    <path d="M 320,240 C 320,70 480,70 480,240" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4,2" />
    
    <!-- Handle Anchors / Buckles -->
    <!-- Left Anchor -->
    <rect x="312" y="225" width="16" height="35" rx="2" fill="#141414" stroke="#000" stroke-width="1" />
    <circle cx="320" cy="242" r="4.5" fill="url(#gold)" stroke="#5c4308" stroke-width="0.5" />
    <!-- Right Anchor -->
    <rect x="472" y="225" width="16" height="35" rx="2" fill="#141414" stroke="#000" stroke-width="1" />
    <circle cx="480" cy="242" r="4.5" fill="url(#gold)" stroke="#5c4308" stroke-width="0.5" />

    <!-- Trapeze Tote Body -->
    <path d="M 240,240 L 560,240 L 510,470 C 510,485 490,490 450,490 L 350,490 C 310,490 290,485 290,470 Z" fill="url(#leather-black)" stroke="#000" stroke-width="2" />
    <path d="M 240,240 L 560,240 L 510,470 C 510,485 490,490 450,490 L 350,490 C 310,490 290,485 290,470 Z" fill="url(#saffiano-grain)" />
    
    <!-- Gold Stitch Border along the edges -->
    <path d="M 248,246 L 552,246 L 504,464 C 504,476 488,482 450,482 L 350,482 C 312,482 296,476 296,464 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6" />

    <!-- Beautiful Curved Flap seam on top -->
    <path d="M 240,260 Q 400,290 560,260" stroke="#111" stroke-width="2" />
    <path d="M 240,260 Q 400,290 560,260" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3,3" opacity="0.3" />

    <!-- Huge Elegant Gilded circular Gold-and-Silver Brand Badge on center stage -->
    <g transform="translate(400, 360)">
      <!-- Outer gold ring -->
      <circle cx="0" cy="0" r="58" fill="none" stroke="url(#gold)" stroke-width="3" />
      
      <!-- Inner silver ring -->
      <circle cx="0" cy="0" r="52" fill="none" stroke="url(#silver)" stroke-width="2" />
      <circle cx="0" cy="0" r="48" fill="#111" />
      <circle cx="0" cy="0" r="48" fill="url(#saffiano-grain)" opacity="0.5" />

      <!-- Center Logo Triangle -->
      <polygon points="0,-18 18,12 -18,12" fill="none" stroke="url(#gold)" stroke-width="2" />

      <!-- High-End typography in badge -->
      <text x="0" y="-22" font-family="'Cinzel', 'Playfair Display', serif" font-weight="900" font-size="11" fill="url(#gold)" letter-spacing="4" text-anchor="middle">ARZEN</text>
      
      <path d="M -30,22 Q 0,26 30,22" fill="none" stroke="url(#silver)" stroke-width="1.2" />
      <text x="0" y="34" font-family="'Inter', sans-serif" font-weight="bold" font-size="6" fill="url(#silver)" letter-spacing="2.5" text-anchor="middle">ELEVATE YOUR STYLE</text>
    </g>

    <!-- Side expansion gold zipper details -->
    <line x1="285" y1="260" x2="285" y2="440" stroke="#0c0c0c" stroke-width="3" />
    <line x1="285" y1="260" x2="285" y2="440" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4" />
    <circle cx="285" cy="260" r="3" fill="url(#gold)" />

    <line x1="515" y1="260" x2="515" y2="440" stroke="#0c0c0c" stroke-width="3" />
    <line x1="515" y1="260" x2="515" y2="440" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4" />
    <circle cx="515" cy="260" r="3" fill="url(#gold)" />
  </g>

  <!-- Title caption text -->
  <text x="400" y="550" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="url(#gold)" letter-spacing="8" text-anchor="middle">ARZEN</text>
  <text x="400" y="570" font-family="'JetBrains Mono', monospace" font-size="9" fill="#888" letter-spacing="4" text-anchor="middle">SIGNATURE COUTURE TOTE / ELEVATE YOUR STYLE</text>
</svg>
