<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="25%" stop-color="#FFFDD0" />
      <stop offset="50%" stop-color="#AA7C11" />
      <stop offset="75%" stop-color="#FDF6C7" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>
    <!-- Marble Tile Gradients -->
    <linearGradient id="marble-tile-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F5" />
      <stop offset="50%" stop-color="#EBEBEB" />
      <stop offset="100%" stop-color="#D6D6D6" />
    </linearGradient>
    <linearGradient id="marble-tile-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EAEAEA" />
      <stop offset="70%" stop-color="#DCDCDC" />
      <stop offset="100%" stop-color="#C0C0C0" />
    </linearGradient>
    <!-- Leather Backpack Gradients -->
    <linearGradient id="backpack-leather" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2c" />
      <stop offset="50%" stop-color="#151515" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <!-- Shadow radial -->
    <radialGradient id="backpack-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.75)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    <!-- Saffiano cross hatch pattern -->
    <pattern id="saffiano-grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <!-- Cross hatch pattern -->
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000000" stroke-width="0.8" opacity="0.4" />
      <line x1="0" y1="4" x2="4" y2="0" stroke="#111111" stroke-width="0.8" opacity="0.4" />
      <line x1="0" y1="0" x2="4" y2="4" stroke="#ffffff" stroke-width="0.4" opacity="0.1" />
    </pattern>
  </defs>

  <!-- Background (Marble Tile Floor) -->
  <rect width="800" height="600" fill="#EAEAEA" />
  
  <!-- Perspective Marble Grid lines -->
  <path d="M -100,600 L 900,100" stroke="#CCCCCC" stroke-width="1.5" />
  <path d="M -100,500 L 900,0" stroke="#CCCCCC" stroke-width="1.5" />
  <path d="M -100,300 L 900,-200" stroke="#CCCCCC" stroke-width="1.5" />
  <path d="M 100,-100 L 700,700" stroke="#B8B8B8" stroke-width="1.5" />
  <path d="M 300,-100 L 900,500" stroke="#B8B8B8" stroke-width="1.5" />
  
  <!-- Subtle Marble Veining in Background -->
  <!-- Vein 1 -->
  <path d="M 150,50 Q 180,80 170,120 T 260,180 T 320,300" fill="none" stroke="#A9A9A9" stroke-width="0.8" opacity="0.3" />
  <!-- Vein 2 -->
  <path d="M 500,100 Q 550,150 510,220 T 630,350 T 680,480" fill="none" stroke="#A9A9A9" stroke-width="0.8" opacity="0.3" />
  <path d="M 530,200 L 590,220" fill="none" stroke="#A9A9A9" stroke-width="0.5" opacity="0.25" />

  <!-- Drop shadow underneath backpack -->
  <ellipse cx="400" cy="495" rx="180" ry="25" fill="url(#backpack-shadow)" />

  <!-- Backpack Body -->
  <g id="classic-backpack">
    <!-- Top handle -->
    <path d="M 370,180 C 370,130 430,130 430,180" fill="none" stroke="#151515" stroke-width="11" />
    <path d="M 370,180 C 370,130 430,130 430,180" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="4,2" />

    <!-- Backpack Dome Silhouette -->
    <path d="M 300,240 C 300,180 340,165 400,165 C 460,165 500,180 500,240 L 500,450 C 500,475 480,485 450,485 L 350,485 C 320,485 300,475 300,450 Z" fill="url(#backpack-leather)" stroke="#111" stroke-width="1.5" />
    <path d="M 300,240 C 300,180 340,165 400,165 C 460,165 500,180 500,240 L 500,450 C 500,475 480,485 450,485 L 350,485 C 320,485 300,475 300,450 Z" fill="url(#saffiano-grain)" />

    <!-- Dome Gold Piping along the contour -->
    <path d="M 300,240 C 300,180 340,165 400,165 C 460,165 500,180 500,240 L 500,450" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.8" />

    <!-- Vertical Front Partition Seam with Golden Zipper -->
    <path d="M 400,165 L 400,310" stroke="url(#gold)" stroke-width="3" />
    <path d="M 400,165 L 400,310" stroke="#000" stroke-width="1" stroke-dasharray="1.5,1.5" />

    <!-- Front Lower Pocket (Horizontal curved shape) -->
    <path d="M 320,320 C 320,310 330,305 345,305 L 455,305 C 470,305 480,310 480,320 L 480,455 C 480,470 470,475 455,475 L 345,475 C 330,475 320,470 320,455 Z" fill="#181818" stroke="#111" stroke-width="1" />
    <path d="M 320,320 C 320,310 330,305 345,305 L 455,305 C 470,305 480,310 480,320 L 480,455 C 480,470 470,475 455,475 L 345,475 C 330,475 320,470 320,455 Z" fill="url(#saffiano-grain)" />
    <!-- Pocket Gold Stitch Border -->
    <path d="M 324,324 C 324,316 332,311 345,311 L 455,311 C 468,311 476,316 476,324 L 476,451 C 476,464 468,469 455,469 L 345,469 C 332,469 324,464 324,451 Z" fill="none" stroke="url(#gold)" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.65" />

    <!-- Horizontal gold zipper track on lower pocket -->
    <path d="M 320,325 L 480,325" stroke="url(#gold)" stroke-width="3" />
    <path d="M 320,325 L 480,325" stroke="#000" stroke-width="1" stroke-dasharray="2,2" />

    <!-- Polished Gold metal Plate ARZEN Logo Centered on Front Pocket -->
    <g transform="translate(400, 385)">
      <!-- Gold rectangle base with rounded corners -->
      <rect x="-60" y="-18" width="120" height="36" rx="4" fill="url(#gold)" stroke="#5c4308" stroke-width="1" />
      <rect x="-56" y="-14" width="112" height="28" rx="2" fill="#0d0d0d" />
      
      <!-- Mini rivets in corners -->
      <circle cx="-52" cy="-10" r="1.5" fill="url(#gold)" />
      <circle cx="52" cy="-10" r="1.5" fill="url(#gold)" />
      <circle cx="-52" cy="10" r="1.5" fill="url(#gold)" />
      <circle cx="52" cy="10" r="1.5" fill="url(#gold)" />

      <!-- High-end Serif ARZEN branding inside plate -->
      <text x="0" y="7" font-family="'Cinzel', 'Playfair Display', 'Georgia', serif" font-weight="bold" font-size="15" fill="url(#gold)" letter-spacing="4" text-anchor="middle">ARZEN</text>
    </g>

    <!-- Side pockets (Left & Right curves) -->
    <!-- Left side pocket pocket -->
    <path d="M 300,340 C 290,340 285,350 285,360 L 285,430 C 285,440 290,445 300,445 Z" fill="#141414" stroke="#000" stroke-width="1" />
    <path d="M 300,340 C 290,340 285,350 285,360 L 285,430 C 285,440 290,445 300,445 Z" fill="url(#saffiano-grain)" />
    <path d="M 285,360 L 300,360" stroke="url(#gold)" stroke-width="2" />

    <!-- Right side pocket pocket -->
    <path d="M 500,340 C 510,340 515,350 515,360 L 515,430 C 515,440 510,445 500,445 Z" fill="#141414" stroke="#000" stroke-width="1" />
    <path d="M 500,340 C 510,340 515,350 515,360 L 515,430 C 515,440 510,445 500,445 Z" fill="url(#saffiano-grain)" />
    <path d="M 515,360 L 500,360" stroke="url(#gold)" stroke-width="2" />
  </g>

  <!-- Lookbook caption text on marble -->
  <text x="400" y="550" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1c1c1c" letter-spacing="8" text-anchor="middle">ARZEN</text>
  <text x="400" y="570" font-family="'JetBrains Mono', monospace" font-size="9" fill="#666" letter-spacing="4" text-anchor="middle">CLASSIC PEBBLED BACKPACK / MONUMENT STONE</text>
</svg>
