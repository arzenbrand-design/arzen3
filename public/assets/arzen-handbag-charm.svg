<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gold Gradients -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="25%" stop-color="#FFFDD0" />
      <stop offset="50%" stop-color="#AA7C11" />
      <stop offset="75%" stop-color="#FDF6C7" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>
    <radialGradient id="pearl" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#EAE5D9" />
      <stop offset="100%" stop-color="#D0C9B5" />
    </radialGradient>
    <!-- White Leather Gradients -->
    <linearGradient id="leather-white" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#F7F5F0" />
      <stop offset="100%" stop-color="#EBE7DE" />
    </linearGradient>
    <radialGradient id="studio-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#F2EFE9" />
      <stop offset="100%" stop-color="#DFD9CD" />
    </radialGradient>
    <radialGradient id="bag-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(142,135,120,0.6)" />
      <stop offset="100%" stop-color="rgba(142,135,120,0)" />
    </radialGradient>
    <!-- Velvet lining gradient -->
    <linearGradient id="velvet-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#143625" />
      <stop offset="100%" stop-color="#081A11" />
    </linearGradient>
  </defs>

  <!-- Background Grid Layout -->
  <rect width="800" height="600" fill="url(#studio-bg)" />
  <line x1="530" y1="0" x2="530" y2="600" stroke="#DFD9CD" stroke-width="2" />
  <line x1="530" y1="200" x2="800" y2="200" stroke="#DFD9CD" stroke-width="1.5" />
  <line x1="530" y1="400" x2="800" y2="400" stroke="#DFD9CD" stroke-width="1.5" />

  <!-- LEFT: MAIN PRODUCT STAGE -->
  <!-- Shadow -->
  <ellipse cx="265" cy="480" rx="160" ry="20" fill="url(#bag-shadow)" />

  <!-- White Handbag drawing -->
  <g id="main-white-bag">
    <!-- Handle (Arched gold chain and leather) -->
    <path d="M 190,260 C 190,140 340,140 340,260" fill="none" stroke="#E0DACF" stroke-width="8" />
    <path d="M 190,260 C 190,140 340,140 340,260" fill="none" stroke="url(#gold)" stroke-width="6" />
    <path d="M 210,165 C 210,165 265,145 320,165" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    
    <!-- Handle Links -->
    <circle cx="190" cy="260" r="10" fill="none" stroke="url(#gold)" stroke-width="4" />
    <circle cx="340" cy="260" r="10" fill="none" stroke="url(#gold)" stroke-width="4" />

    <!-- Trapeze Bag Body -->
    <path d="M 170,260 L 360,260 L 390,440 C 390,455 375,460 350,460 L 180,460 C 155,460 140,455 140,440 Z" fill="url(#leather-white)" stroke="#D5CFC3" stroke-width="1.5" />
    
    <!-- Fine stitching details -->
    <path d="M 175,265 L 355,265 L 382,435 C 382,448 370,452 350,452 L 180,452 C 160,452 148,448 148,435 Z" fill="none" stroke="#CFC8BC" stroke-width="1" stroke-dasharray="3,2" />

    <!-- Center Fold/Stitch Accent -->
    <line x1="265" y1="265" x2="265" y2="452" stroke="#CFC8BC" stroke-width="1" stroke-dasharray="3,2" />

    <!-- Gold Triangle Buckle Clasp -->
    <g transform="translate(265, 340)">
      <polygon points="0,-25 25,15 -25,15" fill="url(#gold)" stroke="#5c4308" stroke-width="1" />
      <polygon points="0,-18 18,10 -18,10" fill="#FFFDD0" opacity="0.3" />
      <!-- Central Gold Pearl Lock Stud -->
      <circle cx="0" cy="5" r="5" fill="url(#pearl)" stroke="url(#gold)" stroke-width="1.5" />
    </g>

    <!-- Dangling Monogram Gold & Pearl "A" Charm -->
    <g transform="translate(325, 230)">
      <!-- Chain link -->
      <line x1="-10" y1="-20" x2="0" y2="0" stroke="url(#gold)" stroke-width="2.5" />
      <!-- Hanging letter A -->
      <path d="M -12,25 L 0,0 L 12,25" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" />
      <line x1="-8" y1="16" x2="8" y2="16" stroke="url(#gold)" stroke-width="3" />
      <!-- Pearl hanging inside -->
      <circle cx="0" cy="11" r="5" fill="url(#pearl)" stroke="url(#gold)" stroke-width="1" />
      <!-- Decorative pearl beads on chain -->
      <circle cx="-5" cy="-10" r="3.5" fill="url(#pearl)" />
    </g>
  </g>

  <!-- Typography Left Side -->
  <text x="265" y="525" font-family="'Cinzel', 'Playfair Display', serif" font-weight="bold" font-size="20" fill="#2b261f" letter-spacing="4" text-anchor="middle">ARZEN AMOUR</text>
  <text x="265" y="545" font-family="'Inter', sans-serif" font-size="9" fill="#7a7060" letter-spacing="3" text-anchor="middle">WHITE CALFSKIN &amp; GOLD PEARL CHARM</text>


  <!-- RIGHT PANEL 1: BACK VIEW (TOP) -->
  <g transform="translate(530, 0)">
    <rect width="270" height="200" fill="#F7F5F0" opacity="0.5" />
    <text x="135" y="30" font-family="'Inter', sans-serif" font-weight="bold" font-size="10" fill="#7a7060" letter-spacing="3" text-anchor="middle">BACK VIEW PROFILE</text>
    <g transform="scale(0.35) translate(180, 110)">
      <!-- Miniature Bag Back view -->
      <path d="M 170,260 L 360,260 L 390,440 C 390,455 375,460 350,460 L 180,460 C 155,460 140,455 140,440 Z" fill="#FFFFFF" stroke="#D5CFC3" stroke-width="2" />
      <!-- Hidden slip pocket on back -->
      <path d="M 160,320 L 370,320 L 380,440 C 380,450 370,455 350,455 L 180,455 C 160,455 150,450 150,440 Z" fill="#FBF9F5" stroke="#CFC8BC" stroke-dasharray="4,2" />
    </g>
  </g>


  <!-- RIGHT PANEL 2: INTERIOR STRUCTURE (MIDDLE) -->
  <g transform="translate(530, 200)">
    <rect width="270" height="200" fill="#143625" opacity="0.05" />
    <text x="135" y="30" font-family="'Inter', sans-serif" font-weight="bold" font-size="10" fill="#143625" letter-spacing="3" text-anchor="middle">ROYAL GREEN VELVET LINING</text>
    
    <!-- Interior Diagram -->
    <g transform="translate(50, 50)">
      <!-- Open rim bag profile shape -->
      <path d="M 10,40 C 10,20 40,10 85,10 C 130,10 160,20 160,40 L 150,110 C 150,118 140,120 85,120 C 30,120 20,118 20,110 Z" fill="url(#velvet-green)" stroke="#0f291c" stroke-width="2" />
      <!-- Gold Zip inside pocket -->
      <line x1="40" y1="50" x2="130" y2="50" stroke="url(#gold)" stroke-width="3" />
      <!-- Leather label inside -->
      <rect x="55" y="75" width="60" height="25" rx="2" fill="#FFFFFF" stroke="url(#gold)" stroke-width="1" />
      <text x="85" y="88" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" fill="#000" text-anchor="middle">ARZEN FRANCE</text>
    </g>
  </g>


  <!-- RIGHT PANEL 3: GOLD EMBLEM LATCH (BOTTOM) -->
  <g transform="translate(530, 400)">
    <rect width="270" height="200" fill="#FDFBF7" opacity="0.5" />
    <text x="135" y="30" font-family="'Inter', sans-serif" font-weight="bold" font-size="10" fill="#7a7060" letter-spacing="3" text-anchor="middle">GOLD TRILOGY CLASP DETAIL</text>
    
    <!-- Large Zoomed Clasp -->
    <g transform="translate(135, 110) scale(1.6)">
      <polygon points="0,-25 25,15 -25,15" fill="url(#gold)" stroke="#5c4308" stroke-width="1.5" />
      <!-- Triple inner line carving -->
      <polygon points="0,-18 18,10 -18,10" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5" />
      <!-- Engraved "ARZEN" small -->
      <text x="0" y="7" font-family="'Inter', sans-serif" font-size="4" font-weight="900" fill="#000" letter-spacing="1" text-anchor="middle">ARZEN</text>
      <!-- Central pearl latch -->
      <circle cx="0" cy="-2" r="4.5" fill="url(#pearl)" stroke="url(#gold)" stroke-width="1" />
    </g>
  </g>
</svg>
