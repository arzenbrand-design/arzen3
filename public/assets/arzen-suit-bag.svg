<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="25%" stop-color="#FFFDD0" />
      <stop offset="50%" stop-color="#AA7C11" />
      <stop offset="75%" stop-color="#FDF6C7" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>
    <!-- Saffiano cross hatch pattern -->
    <pattern id="saffiano-grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000" stroke-width="0.7" opacity="0.35" />
      <line x1="0" y1="4" x2="4" y2="0" stroke="#000" stroke-width="0.7" opacity="0.35" />
    </pattern>
    <!-- Black Leather Gradients -->
    <linearGradient id="leather-black" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="50%" stop-color="#141414" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <radialGradient id="studio-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="70%" stop-color="#0C0C0C" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <radialGradient id="bag-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.85)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#studio-bg)" />
  <ellipse cx="400" cy="500" rx="200" ry="20" fill="url(#bag-shadow)" />

  <!-- Briefcase Drawing -->
  <g id="briefcase">
    <!-- Handle (Golden metal arch) -->
    <path d="M 340,210 C 340,140 460,140 460,210" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" />
    <!-- Handle inner core details -->
    <path d="M 340,210 C 340,140 460,140 460,210" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    
    <!-- Handle brackets/connectors -->
    <rect x="328" y="200" width="24" height="25" fill="url(#gold)" rx="3" stroke="#5c4308" stroke-width="1" />
    <rect x="448" y="200" width="24" height="25" fill="url(#gold)" rx="3" stroke="#5c4308" stroke-width="1" />

    <!-- Main Briefcase Body (Rounded rectangular structure) -->
    <rect x="220" y="220" width="360" height="250" rx="30" fill="url(#leather-black)" stroke="#000" stroke-width="2" />
    <rect x="220" y="220" width="360" height="250" rx="30" fill="url(#saffiano-grain)" />

    <!-- Gold Stitch Border -->
    <rect x="228" y="228" width="344" height="234" rx="22" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.65" />

    <!-- Dual Horizontal Golden Zipper Tracks (Executive briefcase compartments) -->
    <!-- Front Compartment Zip -->
    <line x1="240" y1="245" x2="560" y2="245" stroke="url(#gold)" stroke-width="3" />
    <line x1="240" y1="245" x2="560" y2="245" stroke="#000" stroke-width="0.8" stroke-dasharray="2,2" />
    <!-- Main Zip -->
    <line x1="250" y1="235" x2="550" y2="235" stroke="url(#gold)" stroke-width="3" />
    <line x1="250" y1="235" x2="550" y2="235" stroke="#000" stroke-width="0.8" stroke-dasharray="2,2" />

    <!-- Zip pullers -->
    <rect x="270" y="243" width="8" height="16" fill="url(#gold)" rx="1" />
    <rect x="520" y="243" width="8" height="16" fill="url(#gold)" rx="1" />

    <!-- Front Leather Flap Seam -->
    <path d="M 220,320 C 300,340 500,340 580,320" fill="none" stroke="#0d0d0d" stroke-width="2" />
    <path d="M 220,320 C 300,340 500,340 580,320" fill="none" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3,3" opacity="0.35" />

    <!-- Centered Polished Gold ARZEN brand crest -->
    <g transform="translate(400, 360)">
      <!-- Golden crest shield -->
      <polygon points="0,-25 25,15 -25,15" fill="url(#gold)" stroke="#5c4308" stroke-width="1.5" />
      <polygon points="0,-18 17,10 -17,10" fill="#121212" />
      
      <!-- Inner detail (Stately Crown design) -->
      <path d="M -10,6 L -10,0 L -5,3 L 0,-6 L 5,3 L 10,0 L 10,6 Z" fill="url(#gold)" />
      <!-- Star on crown top -->
      <circle cx="0" cy="-9" r="1.5" fill="url(#gold)" />
    </g>

    <!-- Metal Protection Feet (Bottom corners) -->
    <polygon points="260,470 270,470 267,476 263,476" fill="url(#gold)" stroke="#5c4308" stroke-width="0.5" />
    <polygon points="530,470 540,470 537,476 533,476" fill="url(#gold)" stroke="#5c4308" stroke-width="0.5" />
  </g>

  <!-- Lookbook Typographic stamp -->
  <text x="400" y="550" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="url(#gold)" letter-spacing="8" text-anchor="middle">ARZEN</text>
  <text x="400" y="570" font-family="'JetBrains Mono', monospace" font-size="9" fill="#888" letter-spacing="4" text-anchor="middle">EXECUTIVE BRIEFCASE / OBSIDIAN BLACK SAFFIANO</text>
</svg>
